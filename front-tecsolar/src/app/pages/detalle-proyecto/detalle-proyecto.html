<div class="max-w-7xl mx-auto px-6 py-12 relative min-h-screen">
  
  <a routerLink="/proyectos" class="text-gray-500 hover:text-[#78A942] font-semibold text-sm mb-6 inline-flex items-center gap-2 transition-colors">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
    Volver a todos los proyectos
  </a>

  <h1 class="text-3xl font-bold mb-8 capitalize text-gray-900">
    {{ id?.replaceAll('-', ' ') }}
  </h1>

  @if (imagenes.length === 0) {
    <div class="text-gray-400 py-10 flex items-center gap-2">
      <svg class="animate-spin h-5 w-5" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path></svg>
      Cargando galería...
    </div>
  }

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
    @for (img of imagenes; track img) {
      <div class="rounded-2xl overflow-hidden shadow-lg cursor-pointer" (click)="abrirImagen(img)">
        <img [src]="img" class="w-full h-64 object-cover object-top hover:scale-105 transition-transform duration-300">
      </div>
    }
  </div>
</div>

@if (imagenExpandida) {
  <div class="fixed inset-0 bg-black/90 backdrop-blur-md z-[60] flex items-center justify-center p-4 sm:p-8"
       (click)="cerrarImagen()">
    
    <button (click)="cerrarImagen()" class="absolute top-6 right-6 text-white hover:text-gray-300 z-[70] bg-black/50 p-2 rounded-full transition-colors">
      <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
    
    <img [src]="imagenExpandida" class="max-w-full max-h-full object-contain rounded-xl shadow-2xl" (click)="$event.stopPropagation()">
  </div>
}
